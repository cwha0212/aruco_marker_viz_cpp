# 마커별 map 기준 pose (init_pose_from_marker 노드 파라미터, yaml-cpp 대신 ROS2 파라미터).
#
# marker_ids           : map 에 등록된 마커 ID 목록
# marker_<id>.position : map 프레임에서 마커 중심 위치 [m] (x, y, z)
# marker_<id>.rpy_deg  : '마커 좌표계'의 map 기준 자세 [deg] (roll, pitch, yaw)
#     마커 좌표계 = X:오른쪽, Y:위, Z:마커 평면 바깥(정면). yaw=0 → 마커 정면이 map +x.
#
# 값은 marker_viz 로그의 position/orientation_rpy_deg 를 그대로 옮겨 적으면 된다.

/init_pose_from_marker:
  ros__parameters:
    marker_ids: [1]
    marker_1:
      position: [37.884, 5.739, -0.638]
      rpy_deg: [78.1, 7.0, -169.0]
    # 마커 추가 시:
    #   marker_ids: [1, 2]
    #   marker_2:
    #     position: [x, y, z]
    #     rpy_deg: [roll, pitch, yaw]
